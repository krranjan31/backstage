version: '3'
services:
  postgres:
    image: postgres:14
    container_name: backstage_postgres
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - "5432:5432"

  backstage:
    image: ghcr.io/backstage/backstage:latest
    container_name: backstage_app
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    depends_on:
      - postgres

